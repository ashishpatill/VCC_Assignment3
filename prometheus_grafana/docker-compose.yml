# docker-compose.yml — VCC Assignment 3: Prometheus + Grafana Monitoring Stack
# ================================================================================
# Author: Ashish
# Compatible with: Ubuntu ARM64 (Mac mini M1 via UTM) and x86_64
#
# Services:
#   1. node-exporter  — scrapes OS metrics (CPU, RAM, Disk) from the Ubuntu VM
#   2. prometheus     — collects and stores metrics from node-exporter + monitor.py
#   3. grafana        — visualizes metrics from Prometheus on live dashboards
#
# Usage:
#   docker compose up -d          ← start all services in background
#   docker compose down           ← stop all services (data preserved)
#   docker compose ps             ← check status
#   docker compose logs -f        ← tail logs from all services
#
# Access:
#   Grafana   → http://localhost:3000  (admin / admin)
#   Prometheus → http://localhost:9090
#   Node Exporter metrics → http://localhost:9100/metrics
#   monitor.py custom metrics → http://localhost:8000/metrics
# ================================================================================

services:

  # ──────────────────────────────────────────────────────────────
  # 1. NODE EXPORTER
  #    Reads CPU, RAM, disk, network stats from the host OS
  #    and exposes them at http://localhost:9100/metrics
  #    in Prometheus text format.
  #
  #    It mounts several host directories as read-only so it can
  #    see the real OS stats (not just the container's stats).
  # ──────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    # prom/node-exporter supports linux/arm64 natively — works on M1 Mac
    container_name: node-exporter
    restart: unless-stopped       # Auto-restart if it crashes (not on manual stop)

    ports:
      - "9100:9100"               # host:container — access at localhost:9100

    # Mount host filesystem paths so node-exporter reads the VM's real metrics
    # "ro" = read-only (node-exporter never writes to these)
    volumes:
      - /proc:/host/proc:ro       # Linux process information filesystem
      - /sys:/host/sys:ro         # Linux kernel & hardware information
      - /:/rootfs:ro              # Root filesystem (for disk usage stats)

    # Tell node-exporter which paths to read from (the mounts above)
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # The last flag excludes virtual filesystems from disk stats

    networks:
      - monitoring

  # ──────────────────────────────────────────────────────────────
  # 2. PROMETHEUS
  #    Time-series database that scrapes (polls) metrics from:
  #      - node-exporter (OS metrics)
  #      - monitor.py (custom Python metrics on port 8000)
  #    Stores all metrics with timestamps for historical queries.
  # ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    # prom/prometheus supports linux/arm64 — works on M1 Mac
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"               # Access Prometheus UI at localhost:9090

    volumes:
      # Mount our custom config file into the container
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Named volume for persistent metric storage (survives container restarts)
      - prometheus_data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'   # Keep 7 days of metric history
      - '--web.enable-lifecycle'              # Allow config reload via HTTP POST

    networks:
      - monitoring

    depends_on:
      - node-exporter             # Start node-exporter before prometheus

  # ──────────────────────────────────────────────────────────────
  # 3. GRAFANA
  #    Visualization layer — connects to Prometheus and renders
  #    real-time dashboards showing CPU, RAM, disk, custom metrics.
  #    Access at http://localhost:3000
  #    Default credentials: admin / admin
  # ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    # grafana/grafana supports linux/arm64 — works on M1 Mac
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"               # Access Grafana at localhost:3000

    environment:
      # Pre-configure Grafana admin credentials via environment variables
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      # Disable telemetry reporting to Grafana Labs
      - GF_REPORTING_ENABLED=false
      # Allow embedding in iframes (useful for assignment demo)
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Auto-provision Prometheus as a data source on startup
      - GF_DATASOURCES_DEFAULT_NAME=Prometheus
      - GF_DATASOURCES_DEFAULT_TYPE=prometheus
      - GF_DATASOURCES_DEFAULT_URL=http://prometheus:9090

    volumes:
      # Named volume for Grafana data (dashboards, settings, users)
      - grafana_data:/var/lib/grafana
      # Provisioning folder — auto-loads data sources and dashboards
      - ./grafana_provisioning:/etc/grafana/provisioning

    networks:
      - monitoring

    depends_on:
      - prometheus                # Start prometheus before grafana


# ──────────────────────────────────────────────────────────────
# NETWORKS
# Docker creates a private internal network named "monitoring".
# All three containers can talk to each other using service names
# (e.g., "prometheus" instead of an IP address).
# This is how Grafana connects to Prometheus via "http://prometheus:9090"
# ──────────────────────────────────────────────────────────────
networks:
  monitoring:
    driver: bridge


# ──────────────────────────────────────────────────────────────
# VOLUMES
# Named volumes persist data even when containers are stopped/removed.
# - prometheus_data: all scraped metric history
# - grafana_data: dashboards, users, alert rules you create
#
# To completely reset (delete all data):
#   docker compose down -v
# ──────────────────────────────────────────────────────────────
volumes:
  prometheus_data:
  grafana_data:
